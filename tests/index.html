<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checks &amp; Balances Test Runner</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      padding: 2rem;
      line-height: 1.5;
      background: #0f172a;
      color: #e2e8f0;
    }

    .shell {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      gap: 1.5rem;
    }

    .card {
      background: rgba(15, 23, 42, 0.85);
      border: 1px solid rgba(148, 163, 184, 0.25);
      border-radius: 16px;
      padding: 1.25rem;
    }

    #test-summary {
      font-size: 1.1rem;
    }

    .summary-pass {
      color: #86efac;
    }

    .summary-fail {
      color: #fca5a5;
    }

    #test-results {
      display: grid;
      gap: 0.75rem;
    }

    .test-result {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 0.9rem;
      align-items: start;
      padding: 0.9rem 1rem;
      border-radius: 12px;
      border: 1px solid rgba(148, 163, 184, 0.2);
    }

    .test-result-pass {
      background: rgba(20, 83, 45, 0.35);
    }

    .test-result-fail {
      background: rgba(127, 29, 29, 0.35);
    }

    .test-status {
      font-weight: 700;
      letter-spacing: 0.06em;
      font-size: 0.9rem;
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      margin: 0.5rem 0 0;
      font-size: 0.9rem;
      color: #fecaca;
    }

    #fixture-root {
      border-top: 1px dashed rgba(148, 163, 184, 0.35);
      padding-top: 1rem;
      min-height: 1px;
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="card">
      <h1>Checks &amp; Balances Test Runner</h1>
      <p>
        Run this page through a static file server so module imports and JSON fetches resolve correctly.
        A simple option is <code>python3 -m http.server</code> from the project root.
      </p>
      <div id="test-summary">Running tests…</div>
    </section>

    <section class="card">
      <div id="test-results"></div>
    </section>

    <div id="fixture-root" aria-hidden="true"></div>
  </div>

  <script>
    window.__CB_DISABLE_BOOTSTRAP__ = true;
  </script>
  <script type="module" src="./test-runner.js"></script>
</body>
</html>
